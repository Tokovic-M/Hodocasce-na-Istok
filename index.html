        .hartija { display: inline-block; background: #d4b483; padding: 45px 65px; position: relative; background-image: url('https://transparenttextures.com'); box-shadow: inset 0 0 80px #8b5a2b; border: 1px solid rgba(0,0,0,0.1); max-width: 75%; min-height: 100px; clip-path: polygon(2% 5%, 15% 1%, 38% 6%, 62% 2%, 82% 7%, 95% 2%, 100% 18%, 97% 42%, 100% 62%, 98% 82%, 100% 97%, 85% 100%, 65% 97%, 42% 100%, 25% 98%, 4% 100%, 1% 85%, 5% 65%, 2% 45%, 6% 25%, 0% 8%); margin-bottom: 10px; }

        /* VIDEO */
        #video-container { display: none; margin: 20px auto; width: 800px; max-width: 90%; border: 5px solid #8b5a2b; border-radius: 20px; overflow: hidden; box-shadow: 0 20px 50px rgba(0,0,0,0.8); }

        /* KNJIGA */
        #knjiga-zona { margin: 20px auto; width: 300px; height: 210px; position: relative; z-index: 10; perspective: 1200px; }
        .slika-okvir { position: absolute; width: 100%; height: 100%; transition: 0.6s ease; opacity: 0; transform-origin: left center; }
        .slika-okvir img { width: 100%; height: 100%; object-fit: cover; border: 2px solid #8b5a2b; border-radius: 4px; }
        .slika-okvir.aktivna { opacity: 1; transform: rotateY(-5deg); }
        .slika-okvir.odlece { opacity: 0; transform: rotateY(-120deg); }
        .tekst-na-knjizi { position: absolute; bottom: 0; left: 0; width: 100%; background: rgba(0,0,0,0.7); color: #fff; font-size: 0.8em; padding: 6px; text-align: center; font-weight: bold; line-height: 1.2; }

        /* YOUTUBE SEKCIJA U SREDINI - SADA POTPUNO PROHODNA */
        #yt-zona-sredina { display: flex; flex-direction: column; gap: 40px; align-items: center; margin: 40px auto; position: relative; z-index: 1000; width: fit-content; }
        .ikona-kontejner { position: relative; display: flex; flex-direction: column; align-items: center; }
        .prozor { visibility: hidden; position: absolute; bottom: 125%; left: 50%; transform: translateX(-50%); background: #000; border: 1px solid silver; border-radius: 5px; padding: 5px 12px; color: #ccff00; font-weight: bold; font-size: 0.85em; white-space: nowrap; opacity: 0; transition: 0.2s; z-index: 2000; pointer-events: none; }
        .ikona-kontejner:hover .prozor { visibility: visible; opacity: 1; }

        .ikona-baza { width: 60px; height: 60px; border-radius: 12px; display: flex; align-items: center; justify-content: center; transition: 0.3s; box-shadow: 2px 4px 10px black; border: 1px solid rgba(255,255,255,0.2); position: relative; z-index: 1001; }
        .ikona-kontejner:hover .ikona-baza { transform: scale(1.15) translateY(-5px); }
        .yt1 { background: #FF0000; color: white; font-size: 28px; } 
        .yt2 { background: #8B0000; color: white; font-size: 28px; }

        /* DONJA ZONA */
        .donja-zona { position: fixed; bottom: 30px; left: 0; width: 100%; display: flex; justify-content: space-between; align-items: flex-end; padding: 0 50px; box-sizing: border-box; z-index: 100; }
        .mail { background: #555; font-size: 32px; color: white; } .viber { background: #7360f2; font-size: 32px; color: white; }
        .insta { background: radial-gradient(circle at 30% 107%, #fdf497 0%, #fd5949 45%, #d6249f 60%, #285AEB 90%); font-size: 32px; color: white; }
        .fb { background: #1877F2; font-family: sans-serif; font-weight: bold; font-size: 36px; color: white; }

        @keyframes rotacija { from { transform: rotateY(0deg); } to { transform: rotateY(360deg); } }
    </style>
</head>
<body>

    <script>
                const misli2026 = {

                "6": "Чудио се зашто стално жури, као мећава — док није схватио да га је ђаво узјахао па копитама удара о слабине, а роговима га туче за врат.",

                "30": "Имам гробно место, на прелепом месту, испод тује, одакле se vidi moj grad... Покој нам душама, ускоро, Боже здравља!",

            "6": { 
                "3": "Друга срећа – М. Т.<br><br>Прва слава – глава. Друга слава – кила. Понекад вам бело запоседне тело. Трећа слава – ко зна шта би била.", 
                "28": "Видели су Виду како на острву Виду Видоја вида."

        function idi(n) {

            if(n==710) { window.open("v.mp4", '_blank'); return; }
            window.open(l[n], '_blank');
        }

        function kucajTekst(el, txt) {
            let i = 0;
            el.innerHTML = "";
            let intv = setInterval(() => {
                if (txt[i] === "<") {
                    let k = txt.indexOf(">", i);
                    el.innerHTML += txt.substring(i, k + 1);
                    i = k + 1;
                } else {
                    el.innerHTML += txt[i];
                    i++;
                }
                if (i >= txt.length) clearInterval(intv);
            }, 55);
        }

        let cur = 0; const f = document.querySelectorAll('.slika-okvir');
        function listaj() { if(!f.length) return; f[cur].classList.remove('aktivna'); f[cur].classList.add('odlece'); cur=(cur+1)%f.length; setTimeout(()=>{f[cur].classList.remove('odlece');f[cur].classList.add('aktivna');},50); }
        setInterval(listaj, 3000);

                function postaviSve() {
            const d = new Date();
            const m = d.getMonth() + 1; 
            const dan = d.getDate();

            // 1. AUTOMATSKA POZADINA (m1.jpg, m2.jpg...)
            document.body.style.backgroundImage = "url('m" + m + ".jpg')";

            // 2. PRIKAZ DATUMA
            document.getElementById('datum-prikaz').innerText = d.toLocaleDateString('sr-RS');
            
            // 3. SPECIJALNI REŽIM ZA 7.10. (VIDEO)
            const je710 = (m == 10 && dan == 7);
            document.getElementById('video-container').style.display = je710 ? "block" : "none";
            document.getElementById('glavna-sekcija').style.display = je710 ? "none" : "block";

            kucajTekst(document.getElementById('tekst-misli'), tekst);
        }

        // OSVEŽAVANJE SATA SVAKE SEKUNDE
        setInterval(() => { 
            document.getElementById('sat-prikaz').innerText = new Date().toLocaleTimeString('sr-RS'); 
        }, 1000);

        // POKRETANJE SVEGA PRI UČITAVANJU
        postaviSve();
