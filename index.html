<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <title>М. Токовић - Ходочашће на Исток</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100vh; width: 100%; overflow: hidden; font-family: 'Times New Roman', serif; background-color: #1a1a1a; }
        body { 
            background-image: url('p.jpg'); 
            background-size: cover; 
            background-position: center; 
            background-attachment: fixed; 
            background-repeat: no-repeat; 
        }
        .mrak { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.4); z-index: 1; }

        /* OREOL ZVEZDA OKO LOPTE */
        .zvezde-oreol { position: fixed; top: 15px; left: 15px; width: 160px; height: 160px; z-index: 2; pointer-events: none; }
        .zvezda { position: absolute; background: white; border-radius: 50%; box-shadow: 0 0 10px 2px white; opacity: 0; animation: treperenje 2.5s infinite ease-in-out; }
        @keyframes treperenje { 0%, 100% { opacity: 0; transform: scale(0.3); } 50% { opacity: 1; transform: scale(1.2); } }

        /* LOPTA (TVOJA SLIKA) */
        .scena { position: fixed; top: 30px; left: 30px; width: 125px; height: 125px; perspective: 1000px; z-index: 10; }
        .lopta { width: 100%; height: 100%; position: relative; transform-style: preserve-3d; animation: rotacija 12s linear infinite; }
        .lopta-lice { position: absolute; width: 100%; height: 100%; border-radius: 50%; background: url('j.jpg') center/cover; border: 3px solid silver; box-shadow: 0 0 25px white; }

        /* DESNI BLOK - ZASTAVE I DATUM */
        .blok-desno { position: fixed; top: 30px; right: 30px; display: flex; flex-direction: column; align-items: center; z-index: 20; }
        .zastave { display: flex; gap: 15px; margin-bottom: 10px; }
        .zastava-link { width: 55px; height: 33px; border: 2px solid white; border-radius: 4px; cursor: pointer; transition: 0.3s; display: flex; flex-direction: column; overflow: hidden; box-shadow: 2px 2px 10px #000; text-decoration: none; }
        .zastava-link:hover { transform: scale(1.1); border-color: gold; }
        
        .srb .b1 { background: #C6363C; height: 33.3%; } .srb .b2 { background: #0C4076; height: 33.3%; } .srb .b3 { background: #FFFFFF; height: 33.3%; }
        .rus .b1 { background: #FFFFFF; height: 33.3%; } .rus .b2 { background: #0033A0; height: 33.3%; } .rus .b3 { background: #DA291C; height: 33.3%; }
        .grk { background: #005BAE; position: relative; } .grk::after { content: "✚"; color: white; display: flex; justify-content: center; align-items: center; height: 100%; font-size: 20px; font-weight: bold; }
        #datum-prikaz { color: white; font-size: 1.2em; font-weight: bold; text-shadow: 2px 2px 5px #000; margin-top: 5px; }

        /* SREDINA - PERGAMENT */
        .sadrzaj { position: relative; z-index: 5; text-align: center; margin-top: 100px; }
        h1 { font-size: 3.5em; text-shadow: 3px 3px 15px #000; margin: 0; color: #ccff00; }
        h2 { color: #ccff00; font-style: italic; margin: 0 0 30px 0; font-size: 1.8em; text-shadow: 2px 2px 10px #000; }
        
        .pergament-okvir { display: inline-block; max-width: 85%; margin: 0 auto; filter: drop-shadow(0 15px 30px rgba(0,0,0,0.9)); }
        .hartija {
            background: #d4b483; padding: 50px 70px; position: relative; min-height: 50px; min-width: 250px;
            background-image: url('https://transparenttextures.com');
            clip-path: polygon(2% 5%, 15% 1%, 38% 6%, 62% 2%, 82% 7%, 95% 2%, 100% 18%, 97% 42%, 100% 62%, 98% 82%, 100% 97%, 85% 100%, 65% 97%, 42% 100%, 25% 98%, 4% 100%, 1% 85%, 5% 65%, 2% 45%, 6% 25%, 0% 8%);
            box-shadow: inset 0 0 100px #8b5a2b, inset 0 0 30px rgba(0,0,0,0.4);
            border: 1px solid rgba(0,0,0,0.2);
            animation: bojaHartije 10s infinite alternate ease-in-out;
        }
        @keyframes bojaHartije { 0% { background-color: #d4b483; } 50% { background-color: #e6c58d; } 100% { background-color: #c4a474; } }

        #tekst-misli { color: #8b0000; font-size: 2.3em; font-weight: bold; line-height: 1.4; text-shadow: 1px 1px 0px rgba(255,255,255,0.1); min-height: 1.4em; }
        #tekst-misli a { color: #8b0000; text-decoration: underline; }

        /* PROZORI */
        .info-prozor { display: none; position: fixed; background: rgba(0, 0, 0, 0.95); border: 2px solid silver; border-radius: 15px; padding: 20px; text-align: center; z-index: 100; backdrop-filter: blur(10px); box-shadow: 0 0 30px black; color: white; min-width: 180px; }
        .info-prozor button { background: #8b0000; color: white; border: none; padding: 5px 15px; border-radius: 5px; cursor: pointer; font-weight: bold; margin-top: 15px; }
        .info-prozor a { color: white; text-decoration: none; font-weight: bold; font-size: 1.2em; display: block; }
        .info-prozor a:hover { text-decoration: underline; color: #ccff00; }

        #mejl-prozor { bottom: 30px; left: 20px; }
        #mreze-prozor { bottom: 30px; right: 20px; }

        /* IKONICE */
        .et { position: fixed; bottom: 30px; left: 30px; font-size: 3.5em; color: silver; cursor: pointer; z-index: 10; text-shadow: 2px 2px 5px #000; }
        .donja-desna-zona { position: fixed; bottom: 30px; right: 30px; display: flex; gap: 40px; z-index: 10; }
        .mreza-ikona { font-size: 2.8em; cursor: pointer; text-shadow: 2px 2px 5px #000; }
        .fb-boja { color: #1877F2; } .yt-boja { color: #FF0000; }

        @keyframes rotacija { from { transform: rotateY(0deg); } to { transform: rotateY(360deg); } }
    </style>
</head>
<body>
    <div class="mrak"></div>
    <div class="zvezde-oreol" id="zvezde"></div>
    <div class="scena"><div class="lopta"><div class="lopta-lice"></div></div></div>

    <!-- DESNI BLOK - FIKSIRANI LINKOVI -->
    <div class="blok-desno">
        <div class="zastave">
            <a href="https://crkvenikalendar.com/" target="_blank" class="zastava-link srb"><div class="b1"></div><div class="b2"></div><div class="b3"></div></a>
            <a href="https://saint.gr/" target="_blank" class="zastava-link grk"></a>
            <a href="https://days.pravoslavie.ru/" target="_blank" class="zastava-link rus"><div class="b1"></div><div class="b2"></div><div class="b3"></div></a>
        </div>
        <div id="datum-prikaz"></div>
    </div>

    <div class="sadrzaj">
        <h1>М. Токовић</h1>
        <h2>Ходочашће на Исток</h2>
        <div class="pergament-okvir">
            <div class="hartija">
                <div id="tekst-misli"></div>
            </div>
        </div>
    </div>

    <div id="mejl-prozor" class="info-prozor">
        <a href="mailto:topaz032@gmail.com">topaz032@gmail.com</a>
        <button onclick="zatvoriMejl()">Затвори</button>
    </div>

    <div id="mreze-prozor" class="info-prozor">
        <div id="fb-link" style="display:none;"><a href="https://www.facebook.com/markotokovic" target="_blank">Facebook</a></div>
        <div id="yt-link" style="display:none;"><a href="https://www.youtube.com/@%D0%9C.%D0%A2%D0%BE%D0%BA%D0%BE%D0%B2%D0%B8%D1%9B" target="_blank">YouTube</a></div>
        <button onclick="zatvoriMreze()">Затвори</button>
    </div>

    <div class="et" id="majmunce" onclick="prikaziMejl()">@</div>
    <div class="donja-desna-zona" id="ikonice">
        <div class="mreza-ikona fb-boja" onclick="prikaziMreze('fb')">f</div>
        <div class="mreza-ikona yt-boja" onclick="prikaziMreze('yt')">▶</div>
    </div>

    <script>
        const misliZaMaj = {
            "3.5.": "Кљун се заглавио у решетку канализационог одвода.<br>Уместо да смирено затвори кљун и извуче се,<br>он је све више гордо зевао и усисавао канализацију у себе.",
            "6.5.": "Чудио се зашто стално жури, као мећава —<br>док није схватио да га је ђаво узјахао па копитама удара о слабине,<br>а роговима га туче за врат.",
            "8.5.": "Није исто Q10 и IQ10.",
            "10.5.": "Гледају унакрсно, а нису разроки,<br>да би што више „похватали“.",
            "12.5.": "Један њаче, други гаче, трећи њишти, четврти пишти,<br>пети скаче… - јасно вам је да није реч о животињама.",
            "17.5.": "Знам човека који је имао захват на мозгу,<br>знам и другога који је имао интервенцију на задњици.<br>– Свакоме страда оно што највише користи.",
            "19.5.": "Капетана Куку нису пробадали кукови.",
            "21.5.": "Он је неутралан, чак је неопредељен<br>и по питању самог себе.",
            "22.5.": "Да ниси отишла у бели свет,<br>не би схватила колико је живот у Србији леп.",
            "24.5.": "На свако питање има одговор, али филозофски,<br>мада на нека и философски.",
            "30.5.": "Имам гробно место, на прелепом месту, испод тује...<br>Нит нешто стичем, нит сам спреман за онамо...<br>Покој нам душама, ускоро, Боже здравља!",
            "31.5.": '<a href="https://youtu.be" target="_blank">Тројице</a>'
        };

        function napraviZvezde() {
            const kontejner = document.getElementById('zvezde');
            for(let i=0; i<25; i++) {
                let z = document.createElement('div'); z.className = 'zvezda';
                z.style.width = Math.random() * 3 + 1 + 'px'; z.style.height = z.style.width;
                z.style.left = Math.random() * 150 + 'px'; z.style.top = Math.random() * 150 + 'px';
                z.style.animationDelay = Math.random() * 4 + 's'; kontejner.appendChild(z);
            }
        }

        function kucajTekst(element, tekst) {
            let i = 0; element.innerHTML = "";
            let interval = setInterval(() => {
                if (tekst[i] === "<") {
                    let tagKraj = tekst.indexOf(">", i);
                    element.innerHTML += tekst.substring(i, tagKraj + 1);
                    i = tagKraj + 1;
                } else {
                    element.innerHTML += tekst[i];
                    i++;
                }
                if (i >= tekst.length) clearInterval(interval);
            }, 85);
        }

        function postaviSve() {
            const d = new Date(); const dan = d.getDate(), mesec = d.getMonth() + 1;
            document.getElementById('datum-prikaz').innerText = dan + ". " + mesec + ". " + d.getFullYear() + ".";
            const kljuc = dan + "." + mesec + ".";
            const poruka = misliZaMaj[kljuc] || "Бог постоји за оне који верују,<br>а не постоји за оне који не верују...";
            kucajTekst(document.getElementById('tekst-misli'), poruka);
        }

        function prikaziMejl() { document.getElementById('mejl-prozor').style.display='block'; document.getElementById('majmunce').style.visibility='hidden'; }
        function zatvoriMejl() { document.getElementById('mejl-prozor').style.display='none'; document.getElementById('majmunce').style.visibility='visible'; }
        function prikaziMreze(tip) { document.getElementById('mreze-prozor').style.display='block'; document.getElementById('ikonice').style.visibility='hidden'; document.getElementById('fb-link').style.display=(tip==='fb'?'block':'none'); document.getElementById('yt-link').style.display=(tip==='yt'?'block':'none'); }
        function zatvoriMreze() { document.getElementById('mreze-prozor').style.display='none'; document.getElementById('ikonice').style.visibility='visible'; }

        napraviZvezde(); postaviSve();
    </script>
</body>
</html>
